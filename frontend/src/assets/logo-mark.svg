<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  fill="none"
  role="img"
  aria-label="梦蝶 logo"
>
  <!--
    梦蝶 logo mark
    - 极简对称蝴蝶：由四个椭圆翅膀 + 中央身体构成
    - 颜色用 currentColor，便于跟随主题色（默认落到 SVG root 的 color 属性）
    - 单色描边 + subtle 渐变填充，避免看起来"卡通"
  -->
  <defs>
    <linearGradient id="mengdie-wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.28" />
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="mengdie-wing-b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.28" />
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <g stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左上翅 -->
    <path
      d="M32 32 C 20 12, 8 18, 10 30 C 12 40, 22 38, 32 32 Z"
      fill="url(#mengdie-wing)"
    />
    <!-- 右上翅 -->
    <path
      d="M32 32 C 44 12, 56 18, 54 30 C 52 40, 42 38, 32 32 Z"
      fill="url(#mengdie-wing-b)"
    />
    <!-- 左下翅 -->
    <path
      d="M32 32 C 22 42, 14 50, 20 55 C 26 58, 30 50, 32 42 Z"
      fill="url(#mengdie-wing)"
    />
    <!-- 右下翅 -->
    <path
      d="M32 32 C 42 42, 50 50, 44 55 C 38 58, 34 50, 32 42 Z"
      fill="url(#mengdie-wing-b)"
    />
    <!-- 中央身体 -->
    <path d="M32 20 L 32 46" stroke-width="2.2" />
    <!-- 触角 -->
    <path d="M32 20 C 30 15, 27 13, 25 12" fill="none" />
    <path d="M32 20 C 34 15, 37 13, 39 12" fill="none" />
    <!-- 触角尖端小圆点 -->
    <circle cx="25" cy="12" r="1.1" fill="currentColor" stroke="none" />
    <circle cx="39" cy="12" r="1.1" fill="currentColor" stroke="none" />
  </g>
</svg>

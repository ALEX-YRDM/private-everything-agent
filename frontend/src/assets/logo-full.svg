<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 56"
  fill="none"
  role="img"
  aria-label="梦蝶"
>
  <!--
    梦蝶 logo（横向：图形 + 汉字 + 拼音）
    - 图形部分与 logo-mark 保持一致（缩放到左侧 56×56 方形）
    - 右侧文字 "梦蝶" + 副标 "mèng dié"
    - 全部用 currentColor，便于随主题色
  -->
  <defs>
    <linearGradient id="mengdie-full-wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.28" />
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="mengdie-full-wing-b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.28" />
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- 图形（左侧 56×56 区域，中心 28,28）-->
  <g transform="translate(0, 0) scale(0.875)" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 32 C 20 12, 8 18, 10 30 C 12 40, 22 38, 32 32 Z" fill="url(#mengdie-full-wing)" />
    <path d="M32 32 C 44 12, 56 18, 54 30 C 52 40, 42 38, 32 32 Z" fill="url(#mengdie-full-wing-b)" />
    <path d="M32 32 C 22 42, 14 50, 20 55 C 26 58, 30 50, 32 42 Z" fill="url(#mengdie-full-wing)" />
    <path d="M32 32 C 42 42, 50 50, 44 55 C 38 58, 34 50, 32 42 Z" fill="url(#mengdie-full-wing-b)" />
    <path d="M32 20 L 32 46" stroke-width="2.4" />
    <path d="M32 20 C 30 15, 27 13, 25 12" fill="none" />
    <path d="M32 20 C 34 15, 37 13, 39 12" fill="none" />
    <circle cx="25" cy="12" r="1.2" fill="currentColor" stroke="none" />
    <circle cx="39" cy="12" r="1.2" fill="currentColor" stroke="none" />
  </g>

  <!-- 文字 -->
  <text
    x="66"
    y="30"
    font-family="'PingFang SC', 'HarmonyOS Sans SC', 'Microsoft YaHei', sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="2"
    fill="currentColor"
  >梦蝶</text>
  <text
    x="66"
    y="46"
    font-family="'JetBrains Mono', 'SF Mono', 'Menlo', monospace"
    font-size="10"
    letter-spacing="1.5"
    fill="currentColor"
    opacity="0.5"
  >mèng dié</text>
</svg>
